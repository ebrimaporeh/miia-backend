services:
  - type: web
    name: miia-backend
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn miiabackend.wsgi:application --log-file - --access-logfile - --error-logfile -
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: miiabackend.settings
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: miia-backend.onrender.com,localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGINS
        value: https://miia-frontend.vercel.app
      - key: FRONTEND_URL
        value: https://miia-frontend.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: miia-db
          property: connectionString